<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Belanja — Miu Miu</title>
    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">✦ Miu Miu</div>
        <ul class="menu">
            <li><a href="Index.html" class="nav-link">Home</a></li>
            <li><a href="My_Glasses.html" class="nav-link">Products</a></li>
            <li><a href="About.html" class="nav-link">About</a></li>
            <li><a href="Review.html" class="nav-link">Reviews</a></li>
            <li><a href="Cart.html" class="nav-link cart-icon">🛒 <span class="cart-count" id="cartCount">0</span></a></li>
        </ul>
    </nav>

    <div class="receipt-page">
        <div class="receipt-wrapper">

            <div class="receipt-success-banner">
                <div class="success-icon">🌸</div>
                <h2>Order Confirmed!</h2>
                <p>Terima kasih telah berbelanja di Miu Miu ✦</p>
            </div>

            <div class="receipt-card" id="receiptCard">
                <div class="receipt-header">
                    <div class="receipt-brand">✦ Miu Miu</div>
                    <div class="receipt-tagline">Unapologetically You</div>
                    <div class="receipt-no" id="receiptNo">— — —</div>
                </div>

                <div class="receipt-info" id="receiptInfo">
                    <!-- filled by JS -->
                </div>

                <div class="receipt-items">
                    <div class="receipt-items-title">Detail Pesanan</div>
                    <div id="receiptItems">
                        <!-- filled by JS -->
                    </div>
                </div>

                <div class="receipt-totals" id="receiptTotals">
                    <!-- filled by JS -->
                </div>

                <div class="receipt-payment" id="receiptPayment">
                    <!-- filled by JS -->
                </div>

                <div class="receipt-barcode">
                    <div class="barcode-lines" id="barcode"></div>
                    <div class="barcode-text" id="barcodeText">— — —</div>
                </div>
            </div>

            <div class="receipt-actions">
                <button class="btn-ghost print-btn" onclick="window.print()">🖨️ Print Struk</button>
                <a href="Review.html" class="btn-primary">Tulis Review ✦</a>
                <a href="Index.html" class="btn-ghost" style="flex:1;min-width:140px;text-align:center">🏠 Home</a>
            </div>

        </div>
    </div>

    <footer class="footer"><p>✦ Fashion Miu Miu &copy; 2026 — Unapologetically You</p></footer>

    <script>
        // Cart count (will be 0 after order, that's fine)
        document.getElementById('cartCount').textContent = JSON.parse(localStorage.getItem('cart') || '[]').length;

        function formatIDR(n) { return 'Rp' + n.toLocaleString('id-ID'); }

        // Load order data saved at checkout
        const order = JSON.parse(localStorage.getItem('miumiu_last_order') || 'null');

        if (!order || !order.items || order.items.length === 0) {
            // No order data — show fallback
            document.getElementById('receiptInfo').innerHTML = '<div class="empty-receipt" style="grid-column:1/-1"><p>🌸 Tidak ada data pesanan.</p><a href="Index.html" class="btn-primary">Kembali ke Home</a></div>';
            document.getElementById('receiptItems').innerHTML = '';
            document.getElementById('receiptTotals').innerHTML = '';
            document.getElementById('receiptPayment').innerHTML = '';
        } else {
            // Order number
            const orderNo = 'MIU-' + Date.now().toString().slice(-8).toUpperCase();
            document.getElementById('receiptNo').textContent = 'No. ' + orderNo;

            // Barcode visual
            const barcode = document.getElementById('barcode');
            const pattern = [3,6,2,8,4,7,2,5,9,3,6,2,8,3,7,5,4,8,2,6,3,9,5,7,3,6,4,8];
            barcode.innerHTML = pattern.map(h =>
                `<div style="width:${Math.random()>0.5?2:3}px;height:${h*4+10}px;opacity:${0.7+Math.random()*0.3}"></div>`
            ).join('');
            document.getElementById('barcodeText').textContent = orderNo;

            // Info
            const paymentLabels = {
                transfer: '🏦 Bank Transfer',
                gopay: '💚 GoPay',
                ovo: '💜 OVO',
                dana: '💙 DANA',
                cod: '💵 COD',
                card: '💳 Credit/Debit Card'
            };
            const payLabel = paymentLabels[order.payment] || order.payment;
            const dateStr = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
            const timeStr = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

            document.getElementById('receiptInfo').innerHTML = `
                <div class="info-row"><label>Nama</label><span>${order.name}</span></div>
                <div class="info-row"><label>Tanggal</label><span>${dateStr}</span></div>
                <div class="info-row"><label>Telepon</label><span>${order.phone || '-'}</span></div>
                <div class="info-row"><label>Waktu</label><span>${timeStr}</span></div>
                <div class="info-row" style="grid-column:1/-1"><label>Alamat Pengiriman</label><span>${order.address}${order.city ? ', ' + order.city : ''}${order.postal ? ' ' + order.postal : ''}</span></div>
            `;

            // Items
            let subtotal = 0;
            document.getElementById('receiptItems').innerHTML = order.items.map(item => {
                subtotal += item.price;
                return `
                <div class="receipt-item">
                    <img src="${item.img}" alt="${item.name}" onerror="this.style.display='none'">
                    <div class="receipt-item-name">${item.name}</div>
                    <div class="receipt-item-price">${formatIDR(item.price)}</div>
                </div>`;
            }).join('');

            // Totals
            document.getElementById('receiptTotals').innerHTML = `
                <div class="total-row"><span>Subtotal (${order.items.length} item)</span><span>${formatIDR(subtotal)}</span></div>
                <div class="total-row"><span>Ongkos Kirim</span><span style="color:#2e9e5a">Gratis ✦</span></div>
                <div class="total-row grand"><span>Total</span><span>${formatIDR(subtotal)}</span></div>
            `;

            // Payment
            document.getElementById('receiptPayment').innerHTML = `
                <div style="margin-bottom:8px;font-size:11px;color:#bbb;text-transform:uppercase;letter-spacing:1.5px">Metode Pembayaran</div>
                <div class="payment-badge">${payLabel}</div>
                <div style="margin-top:12px;font-size:12px;color:var(--mid)">Status: <strong style="color:#2e9e5a">✓ Dikonfirmasi</strong></div>
            `;
        }
    </script>
</body>
</html>
